# 출처: work-plans/002-gitops-handover-scope.md Scope 3 — 의존성 분리 편입 (B-2)
# 대상: infra/rhoai/gateway (maas-default-gateway in openshift-ingress)
# 의도:
#   - RHOAI ModelsAsServiceReady 의존성(maas-default-gateway)을 ArgoCD가 인계받게 한다.
#   - drift 0 상태에서 prune=false로 안전 sync.
#   - Gateway sync 권한은 bootstrap namespace transformer 영향을 피하기 위해 ClusterRole/Binding으로 보강한다.
#   - openshift-ingress는 OpenShift 시스템 네임스페이스 — CreateNamespace=false 유지.
# 운영 모드 전환 체크리스트:
#   1. infra/argocd/bootstrap/kustomization.yaml의 gitops-repo-config로 repoURL/targetRevision 자동 주입
#   2. runbooks/31-rhoai-dependency-app-sync.md 절차에 따라 dry-run → diff → sync
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: maas-gateway
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: openshift-ai-gitops
    app.kubernetes.io/component: rhoai-dependency
spec:
  project: platform-operators
  source:
    # bootstrap kustomization의 gitops-repo-config replacement로 동일 값을 재주입한다.
    repoURL: https://github.com/ssgkim/openshift-ai-gitops.git
    targetRevision: main
    path: infra/rhoai/gateway
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-ingress
  syncPolicy:
    syncOptions:
      - CreateNamespace=false       # openshift-ingress는 시스템 ns, 생성 금지
      - ApplyOutOfSyncOnly=true
      - Prune=false
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
