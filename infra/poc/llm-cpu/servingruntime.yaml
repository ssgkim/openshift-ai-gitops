# Source: redhat-ods-applications/vllm-cpu-x86-runtime-template, RHOAI 3.4.0-ea.1.
# Intent: CPU x86 vLLM runtime for a small public Hugging Face model.
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-cpu-x86-runtime
  namespace: rhoai-poc-llm-cpu
  annotations:
    opendatahub.io/runtime-version: v0.14.1
    openshift.io/display-name: "vLLM CPU (x86) ServingRuntime for KServe"
  labels:
    opendatahub.io/dashboard: "true"
spec:
  annotations:
    opendatahub.io/kserve-runtime: vllm
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
  containers:
    - name: kserve-container
      image: registry.redhat.io/rhaii-early-access/vllm-cpu-rhel9@sha256:2da77e06d0c017fe99a9cff155583a566dec7cf40bb7408ccf1821f5ff18c5d0
      command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - --port=8080
        - --model=/mnt/models
        - --served-model-name={{.Name}}
        - --max-model-len=1024
      env:
        - name: HF_HOME
          value: /tmp/hf_home
        - name: VLLM_CPU_KVCACHE_SPACE
          value: "2"
      ports:
        - containerPort: 8080
          protocol: TCP
  multiModel: false
  supportedModelFormats:
    - name: vLLM
      autoSelect: true
